name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build workflow
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.alfredworkflow
          generate_release_notes: true
